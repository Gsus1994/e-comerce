services:
  postgres:
    image: postgres:16-alpine
    container_name: ecommerce-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ecommerce
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ecommerce"]
      interval: 10s
      timeout: 5s
      retries: 5

  fastapi:
    build:
      context: ..
      dockerfile: docker/fastapi.Dockerfile
    container_name: ecommerce-fastapi
    restart: unless-stopped
    env_file:
      - ../.env
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@postgres:5432/ecommerce
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  streamlit:
    build:
      context: ..
      dockerfile: docker/streamlit.Dockerfile
    container_name: ecommerce-streamlit
    restart: unless-stopped
    environment:
      API_BASE_URL: http://fastapi:8000
    depends_on:
      fastapi:
        condition: service_healthy
    ports:
      - "8501:8501"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8501')\""]
      interval: 15s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
