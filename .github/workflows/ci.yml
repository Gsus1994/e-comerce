name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  lint-type-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        working-directory: ecommerce
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]

      - name: Ruff format check
        working-directory: ecommerce
        run: ruff format --check .

      - name: Ruff lint
        working-directory: ecommerce
        run: ruff check .

      - name: MyPy
        working-directory: ecommerce
        run: mypy apps packages

      - name: Pytest
        working-directory: ecommerce
        run: pytest
