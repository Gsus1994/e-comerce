name: CI

'on':
  push:
    branches:
      - dev
      - main
    paths:
      - "ecommerce/**"
      - ".github/workflows/ci.yml"
  pull_request:
    branches:
      - dev
      - main
    paths:
      - "ecommerce/**"
      - ".github/workflows/ci.yml"
  workflow_dispatch: {}

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint-type-test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: ecommerce

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: ecommerce/pyproject.toml

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e '.[dev]'

      - name: Ruff format check
        run: ruff format --check .

      - name: Ruff lint
        run: ruff check .

      - name: MyPy
        run: mypy apps packages

      - name: Pytest
        run: pytest
